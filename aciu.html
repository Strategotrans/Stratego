<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stratego Trans | Thank You</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050608; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { 
            width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px; border-radius: 30px; text-align: center;
        }

        .check-circle { 
            width: 70px; height: 70px; background: rgba(0, 255, 135, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px;
        }

        h1 { font-size: 1.8rem; margin: 0 0 10px; }
        p { color: rgba(255, 255, 255, 0.6); line-height: 1.5; margin-bottom: 30px; }

        .lang-section { display: none; } /* Visi paslėpti */
        .lang-section.active { display: block; } /* Tik aktyvus matomas */
    </style>
</head>
<body>

    <div class="card">
        <div class="check-circle">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#00ff87" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div id="lang-en" class="lang-section active"><h1>Thank You!</h1><p>Request received. We will be in touch shortly.</p></div>
        <div id="lang-lt" class="lang-section"><h1>Ačiū!</h1><p>Užklausa gauta. Netrukus susisieksime.</p></div>
        <div id="lang-de" class="lang-section"><h1>Danke!</h1><p>Anfrage erhalten. Wir melden uns in Kürze.</p></div>
        <div id="lang-pl" class="lang-section"><h1>Dziękujemy!</h1><p>Zapytanie otrzymane. Wkrótce się skontaktujemy.</p></div>
        <div id="lang-ru" class="lang-section"><h1>Спасибо!</h1><p>Запрос получен. Скоро свяжемся с вами.</p></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        
        // Pakeičiame aktyvią klasę
        document.querySelectorAll('.lang-section').forEach(el => el.classList.remove('active'));
        const activeLang = document.getElementById('lang-' + lang) || document.getElementById('lang-en');
        activeLang.classList.add('active');

        // Nukreipimas po 4 sekundžių
        setTimeout(() => { window.location.href = "index.html"; }, 4000);
    </script>
</body>
</html>
