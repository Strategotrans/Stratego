<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stratego Trans | Thank You</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: #050608; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            opacity: 0; /* Pradžioje nematomas, kad galėtume gražiai parodyti */
            transition: opacity 0.8s ease-in-out;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: rgba(0, 255, 135, 0.08); filter: blur(150px); border-radius: 50%;
        }
        .container { position: relative; z-index: 1; text-align: center; padding: 20px; }
        .check-circle { 
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 2rem; margin: 0 0 15px; }
        p { color: rgba(255, 255, 255, 0.7); font-size: 1rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }
        .lang-section { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .lang-section.active { display: block; opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="check-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ff87" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div id="lang-en" class="lang-section active">
            <h1>Thank You!</h1>
            <p>Request received. We will contact you shortly.</p>
        </div>
        <div id="lang-lt" class="lang-section">
            <h1>Ačiū!</h1>
            <p>Gavome jūsų užklausą. Susisieksime netrukus.</p>
        </div>
        <div id="lang-de" class="lang-section">
            <h1>Danke!</h1>
            <p>Anfrage erhalten. Wir melden uns in Kürze.</p>
        </div>
        <div id="lang-pl" class="lang-section">
            <h1>Dziękujemy!</h1>
            <p>Otrzymaliśmy Twoje zapytanie. Wkrótce się skontaktujemy.</p>
        </div>
        <div id="lang-ru" class="lang-section">
            <h1>Спасибо!</h1>
            <p>Ваш запрос получен. Скоро свяжемся с вами.</p>
        </div>
    </div>

    <script>
        // 1. Puslapio atsiradimas (fade-in)
        window.addEventListener('load', () => {
            document.body.style.opacity = "1";
        });

        // 2. Kalbos nustatymas pagal URL parametrą
        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        
        document.querySelectorAll('.lang-section').forEach(el => el.classList.remove('active'));
        const activeLang = document.getElementById('lang-' + lang) || document.getElementById('lang-en');
        activeLang.classList.add('active');
        
        // 3. Švelnus išnykimas ir automatinis grįžimas po 3.5 sekundžių
        setTimeout(() => {
            document.body.style.opacity = "0"; // Pradedam blukinti
            setTimeout(() => {
                window.location.href = "index.html?lang=" + lang;
            }, 800); // 800ms palaukiam, kol įvyks blukimas
        }, 3500); 
    </script>
</body>
</html>
