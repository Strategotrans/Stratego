<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stratego Trans | Thank You</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #050608; color: #fff; 
            font-family: 'Inter', sans-serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh;
            /* Pradžioje nematomas, perėjimas užtrunka 0.8s */
            opacity: 0; transition: opacity 0.8s ease-in-out;
        }
        body::before {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: rgba(0, 255, 135, 0.08); filter: blur(150px); border-radius: 50%;
        }
        .container { position: relative; z-index: 1; text-align: center; padding: 20px; max-width: 600px; }
        .check-circle { 
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 2rem; margin: 0 0 15px; color: #fff; }
        p { color: rgba(255, 255, 255, 0.7); font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container" id="content">
        <div class="check-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ff87" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div id="dynamic-text"></div>
    </div>

    <script>
        const texts = {
            'en': '<h1>Thank You!</h1><p>Request received. We specialize in freight forwarding, local and international transport, vehicle, yacht, oversized cargo, trailer towing, and roadside assistance. We will contact you shortly.</p>',
            'lt': '<h1>Ačiū!</h1><p>Gavome jūsų užklausą. Esame krovinių ekspedijavimo, vietinių ir tarptautinių pervežimų, automobilių, laivų bei negabaritinių krovinių gabenimo ekspertai. Taip pat teikiame techninę pagalbą kelyje. Susisieksime netrukus.</p>',
            'de': '<h1>Danke!</h1><p>Anfrage erhalten. Wir sind Ihr Partner für Spedition, nationale und internationale Transporte, Fahrzeug- und Yachttransporte, Schwertransporte, Anhängertransport sowie Pannenhilfe. Wir melden uns in Kürze.</p>',
            'pl': '<h1>Dziękujemy!</h1><p>Otrzymaliśmy Twoje zapytanie. Specjalizujemy się w spedycji, transporcie krajowym i międzynarodowym, przewozie aut, łodzi, ładunków ponadgabarytowych, przyczep oraz pomocy drogowej. Wkrótce się skontaktujemy.</p>',
            'ru': '<h1>Спасибо!</h1><p>Ваш запрос получен. Мы специализируемся на экспедировании, международных и местных перевозках, доставке авто, яхт, негабаритных грузов, прицепов и технической помощи на дорогах. Скоро свяжемся с вами.</p>'
        };

        const params = new URLSearchParams(window.location.search);
        const lang = params.get('lang') || 'en';
        
        // Įrašome tekstą
        document.getElementById('dynamic-text').innerHTML = texts[lang] || texts['en'];
        
        // ATSIDARYMAS: Kai puslapis įsikrauna, padarome jį matomu po 100ms (dėl sklandumo)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.style.opacity = "1";
            }, 100);
        });
        
        // UŽSIDARYMAS: 5 sekundžių pauzė (SEO draugiška) + 0.8s išnykimas
        setTimeout(() => {
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = "index.html?lang=" + lang;
            }, 800);
        }, 5000); // 5000ms = 5 sekundės skaitymo laiko
    </script>
</body>
</html>
